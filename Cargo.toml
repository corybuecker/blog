[package]
name = "blog"
version = "0.1.0"
edition = "2024"
resolver = "3"

[dependencies]
anyhow = "1.0.97"
axum = { version = "0.8.2" }
chrono = "0.4.40"
comrak = { version = "0.36.0" }
include_dir = { version = "0.7.4", features = ["glob"] }
openidconnect = { version = "4.0.0", features = ["reqwest"] }
serde = "1.0.218"
tera = { version = "1.20.0", features = ["builtins"] }
tokio = { version = "1.44.0", default-features = false, features = ["macros", "rt-multi-thread", "signal"] }
tokio-postgres = { version = "0.7.13", features = ["with-chrono-0_4"] }
tower-cookies = { version = "0.11.0", features = ["signed"] }
tower-http = { version = "0.6.2", features = ["trace", "fs"] }
tracing = { version = "0.1.41" }
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
xml-builder = { version = "0.5" }

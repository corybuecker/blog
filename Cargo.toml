[package]
name = "blog"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = "0.8.1"
bson = { version = "2.13.0", features = ["chrono-0_4", "serde_with-3"] }
chrono = "0.4.39"
comrak = "0.34.0"
futures = "0.3.31"
log = "0.4.25"
mongodb = "3.2.0"
openidconnect = { version = "3.5.0", features = ["reqwest"] }
serde = "1.0.217"
serde_with = "3.12.0"
tera = { version = "1.20.0", features = ["builtins"] }
tokio = { version = "1.43.0", features = ["full"] }
tower-cookies = { version = "0.11.0", features = ["signed"] }
tower-http = { version = "0.6.2", features = ["trace", "fs"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.19", features = ["env-filter"] }
xml-builder = { version = "0.5" }


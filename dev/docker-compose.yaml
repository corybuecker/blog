services:
  postgres:
    image: postgres@sha256:fe3f571d128e8efadcd8b2fde0e2b73ebab6dbec33f6bfe69d98c682c7d8f7bd # 17.4
    ports:
      - 5432:5432
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: blog
      POSTGRES_USER: blog
    volumes:
      - ../migrations/schema.sql:/docker-entrypoint-initdb.d/initialize.sql
  prometheus:
    image: prom/prometheus@sha256:339ce86a59413be18d0e445472891d022725b4803fab609069110205e79fb2f1 # v3.3.0
    ports:
      - 9090:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-otlp-receiver
  jaeger:
    image: jaegertracing/jaeger@sha256:20d715ade1cf32e8c2be1a288317c2126376ce60811be71f0856793d7f849127 # 2.5.0
    ports:
      - 16686:16686
      - 4318:4318
  grafana:
    image: grafana/grafana@sha256:52c3e20686b860c6dc1f623811565773cf51eefa378817a4896dfc863c3c82c8 # 11.6.1
    ports:
      - 3000:3000
  exlytics:
    image: ghcr.io/corybuecker/exlytics@sha256:cdb8507b23f63970b985be4fbf1ae5c1020215c6e80b06d8f9685b1e1b1f4d05 # 1.0.0
    ports:
      - 8001:8001
    environment:
      - DATABASE_URL=postgres://blog@postgres:5432/exlytics
      - METRICS_ENDPOINT=http://prometheus:9090/api/v1/otlp/v1/metrics
      - OTEL_METRIC_EXPORT_INTERVAL=10000
      - TRACING_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - postgres
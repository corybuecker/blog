apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blog
  namespace: blog
spec:
  parentRefs:
    - kind: Gateway
      name: external-http
      namespace: default
  hostnames:
    - corybuecker.dev
    - www.corybuecker.dev
  rules:
    - backendRefs:
        - name: blog
          namespace: blog
          port: 80
